name: build-vast-image

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.vast
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/batch-faceswap-tool-pyworker:latest
            ghcr.io/${{ github.repository_owner }}/batch-faceswap-tool-pyworker:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
